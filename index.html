<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FRACTURED RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-brand">
    <div class="brand-diamond"><span></span></div>
    <h1 class="brand-title">FRACTURED</h1>
    <p class="brand-sub">VTT · MESA VIRTUAL DE RPG</p>
    <p class="brand-tag">Crie mesas, role dados e jogue com seus amigos.</p>
  </div>

  <div class="login-card">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('register')">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="login()">Entrar</button>
      <button type="button" class="forgot-link" onclick="forgotPassword()">Esqueci a senha</button>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="field">
        <label>Nome do Usuário</label>
        <input type="text" id="reg-username" placeholder="Como você quer ser chamado">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="reg-password" placeholder="mínimo 6 caracteres">
      </div>
      <div class="field">
        <label>Convite de cadastro *</label>
        <input type="text" id="reg-convite" placeholder="Código fornecido pelo administrador" style="text-transform:uppercase">
      </div>
      <button class="btn-primary" onclick="register()">Criar Conta</button>
    </div>

    <div id="auth-msg" class="auth-msg"></div>
  </div>

  <p class="login-foot">© 2026 Fractured RPG · <span class="foot-lang active">PT</span> · <span class="foot-lang">EN</span></p>
</div>

<script src="supabase.js"></script>
<script>
function switchTab(tab) {
  document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('tab-register').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('auth-msg').textContent = '';
}

function showMsg(msg, err=false) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg ' + (err ? 'error' : 'success');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showMsg('Preencha email e senha.', true);

  showMsg('Entrando...');
  const { error } = await db.auth.signInWithPassword({ email, password });
  if (error) return showMsg(error.message, true);
  window.location.href = 'app.html';
}

async function forgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) return showMsg('Digite seu email no campo acima para receber o link de redefinição.', true);
  showMsg('Enviando link de redefinição...');
  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/index.html'
  });
  if (error) return showMsg(error.message, true);
  showMsg('Se houver conta com esse email, enviamos um link de redefinição.', false);
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const convite = document.getElementById('reg-convite').value.trim().toUpperCase();

  if (!username || !email || !password) return showMsg('Preencha todos os campos obrigatórios.', true);
  if (!convite) return showMsg('É necessário um convite de cadastro. Peça ao administrador.', true);
  if (password.length < 6) return showMsg('Senha precisa ter pelo menos 6 caracteres.', true);

  showMsg('Verificando convite...');
  // Checa o convite ANTES de criar a conta (mensagem de erro clara)
  const { data: ok, error: convErr } = await db.rpc('checar_convite', { cod: convite });
  if (convErr) return showMsg('Erro ao verificar convite: ' + convErr.message, true);
  if (!ok) return showMsg('Convite inválido ou já utilizado.', true);

  showMsg('Criando conta...');
  const { data, error } = await db.auth.signUp({ email, password, options: { data: { convite } } });
  if (error) {
    const msg = /convite|Database error/i.test(error.message)
      ? 'Convite inválido ou já utilizado.'
      : error.message;
    return showMsg(msg, true);
  }

  // Perfil é criado sempre como player — mestre agora é por mesa (quem cria a mesa).
  const { error: profileError } = await db.from('profiles').insert({
    id: data.user.id,
    username
  });

  if (profileError) return showMsg('Conta criada! Faça login.', false);
  showMsg('Conta criada! Entrando...', false);
  setTimeout(() => window.location.href = 'app.html', 1000);
}

// Se já logado, redireciona
db.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'app.html';
});
</script>
</body>
</html>
